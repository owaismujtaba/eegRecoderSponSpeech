<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 820" width="900" height="820" font-family="Courier, monospace">

  <!-- Background -->
  <rect width="900" height="820" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Spontaneous Speech Experiment — Flow Diagram</text>

  <!-- ── GLOBAL KEY ── -->
  <rect x="720" y="60" width="160" height="44" rx="6" fill="#fff3cd" stroke="#e0a800" stroke-width="1.5"/>
  <text x="800" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#856404">Global</text>
  <text x="800" y="96" text-anchor="middle" font-size="11" fill="#856404">Q → Quit app</text>

  <!-- ══════════════════════════════════
       NODES
  ══════════════════════════════════ -->

  <!-- START -->
  <ellipse cx="450" cy="100" rx="55" ry="26" fill="#1a1a2e" stroke="#1a1a2e"/>
  <text x="450" y="105" text-anchor="middle" font-size="13" fill="white" font-weight="bold">START</text>

  <!-- MainPage -->
  <rect x="300" y="170" width="300" height="64" rx="10" fill="#4361ee" stroke="#3a0ca3" stroke-width="2"/>
  <text x="450" y="196" text-anchor="middle" font-size="13" font-weight="bold" fill="white">MainPage</text>
  <text x="450" y="215" text-anchor="middle" font-size="11" fill="#c8d8ff">Welcome to the Experiment</text>

  <!-- InstructionsScreen -->
  <rect x="300" y="300" width="300" height="64" rx="10" fill="#4361ee" stroke="#3a0ca3" stroke-width="2"/>
  <text x="450" y="326" text-anchor="middle" font-size="13" font-weight="bold" fill="white">InstructionsScreen</text>
  <text x="450" y="345" text-anchor="middle" font-size="11" fill="#c8d8ff">Overview + Step-by-step instructions</text>

  <!-- ExperimentScreen -->
  <rect x="280" y="440" width="340" height="64" rx="10" fill="#7b2d8b" stroke="#560bad" stroke-width="2"/>
  <text x="450" y="466" text-anchor="middle" font-size="13" font-weight="bold" fill="white">ExperimentScreen</text>
  <text x="450" y="485" text-anchor="middle" font-size="11" fill="#e8c8ff">Fixation cross → Image display</text>

  <!-- Fixation Cross detail box -->
  <rect x="100" y="560" width="180" height="54" rx="8" fill="#f0e6ff" stroke="#7b2d8b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="190" y="581" text-anchor="middle" font-size="11" font-weight="bold" fill="#560bad">Fixation Cross</text>
  <text x="190" y="598" text-anchor="middle" font-size="10" fill="#560bad">Shows "+" for 1.5 s</text>
  <text x="190" y="612" text-anchor="middle" font-size="10" fill="#560bad">then auto-advances</text>

  <!-- Image display detail box -->
  <rect x="620" y="560" width="180" height="54" rx="8" fill="#f0e6ff" stroke="#7b2d8b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="710" y="581" text-anchor="middle" font-size="11" font-weight="bold" fill="#560bad">Image Display</text>
  <text x="710" y="598" text-anchor="middle" font-size="10" fill="#560bad">Scaled image shown</text>
  <text x="710" y="612" text-anchor="middle" font-size="10" fill="#560bad">ENTER → next image</text>

  <!-- RestScreen -->
  <rect x="300" y="680" width="300" height="64" rx="10" fill="#2d6a4f" stroke="#1b4332" stroke-width="2"/>
  <text x="450" y="706" text-anchor="middle" font-size="13" font-weight="bold" fill="white">RestScreen</text>
  <text x="450" y="725" text-anchor="middle" font-size="11" fill="#b7e4c7">"Resting…" — SPACE to resume</text>

  <!-- END -->
  <ellipse cx="450" cy="790" rx="55" ry="22" fill="#1a1a2e" stroke="#1a1a2e"/>
  <text x="450" y="796" text-anchor="middle" font-size="13" fill="white" font-weight="bold">END</text>

  <!-- ══════════════════════════════════
       ARROWS
  ══════════════════════════════════ -->

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
    <marker id="arr-esc" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e63946"/>
    </marker>
    <marker id="arr-grn" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2d6a4f"/>
    </marker>
  </defs>

  <!-- START → MainPage -->
  <line x1="450" y1="126" x2="450" y2="168" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- MainPage → InstructionsScreen (SPACE) -->
  <line x1="450" y1="234" x2="450" y2="298" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="460" y="252" width="74" height="18" rx="4" fill="#e9ecef"/>
  <text x="497" y="265" text-anchor="middle" font-size="11" fill="#333">SPACE</text>

  <!-- InstructionsScreen → ExperimentScreen (SPACE) -->
  <line x1="450" y1="364" x2="450" y2="438" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="460" y="388" width="74" height="18" rx="4" fill="#e9ecef"/>
  <text x="497" y="401" text-anchor="middle" font-size="11" fill="#333">SPACE</text>

  <!-- InstructionsScreen → MainPage (ESCAPE) -->
  <path d="M300,332 Q200,332 200,202 Q200,170 298,170" stroke="#e63946" stroke-width="1.8" fill="none" stroke-dasharray="6,3" marker-end="url(#arr-esc)"/>
  <rect x="148" y="292" width="74" height="18" rx="4" fill="#fde8ea"/>
  <text x="185" y="305" text-anchor="middle" font-size="11" fill="#e63946">ESCAPE</text>

  <!-- ExperimentScreen → Fixation detail -->
  <line x1="350" y1="504" x2="260" y2="558" stroke="#7b2d8b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- ExperimentScreen → Image detail -->
  <line x1="550" y1="504" x2="640" y2="558" stroke="#7b2d8b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- Fixation → Image (auto after 1.5s) -->
  <path d="M280,587 Q450,540 620,587" stroke="#7b2d8b" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <rect x="387" y="543" width="126" height="18" rx="4" fill="#f0e6ff"/>
  <text x="450" y="556" text-anchor="middle" font-size="10" fill="#560bad">auto after 1.5 s</text>

  <!-- Image ENTER → back to fixation (loop) -->
  <path d="M800,587 Q860,587 860,472 Q860,440 622,460" stroke="#333" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="828" y="500" width="60" height="18" rx="4" fill="#e9ecef"/>
  <text x="858" y="513" text-anchor="middle" font-size="11" fill="#333">ENTER</text>

  <!-- ExperimentScreen → RestScreen (ESCAPE) -->
  <line x1="450" y1="504" x2="450" y2="678" stroke="#e63946" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arr-esc)"/>
  <rect x="460" y="578" width="74" height="18" rx="4" fill="#fde8ea"/>
  <text x="497" y="591" text-anchor="middle" font-size="11" fill="#e63946">ESCAPE</text>

  <!-- RestScreen → ExperimentScreen (SPACE resume) -->
  <path d="M300,712 Q240,712 240,472 Q240,440 278,460" stroke="#2d6a4f" stroke-width="1.8" fill="none" stroke-dasharray="6,3" marker-end="url(#arr-grn)"/>
  <rect x="148" y="590" width="90" height="18" rx="4" fill="#d8f3dc"/>
  <text x="193" y="603" text-anchor="middle" font-size="11" fill="#2d6a4f">SPACE resume</text>

  <!-- ExperimentScreen → END (all images done) -->
  <path d="M450,744 Q450,760 450,766" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <rect x="355" y="748" width="130" height="18" rx="4" fill="#e9ecef"/>
  <text x="420" y="761" text-anchor="middle" font-size="10" fill="#333">all images done → MainPage</text>

</svg>
